---
- name: Check if Claude Desktop is installed
  command: command -v claude-desktop
  register: claude_desktop_exists
  failed_when: false
  changed_when: false

- name: Download Claude Desktop deb package
  get_url:
    url: "{{ claude_desktop.deb_url }}"
    dest: /tmp/claude-desktop.deb
    mode: '0644'
  when: force_install | default(false) | bool or claude_desktop_exists.rc != 0

- name: Install Claude Desktop
  apt:
    deb: /tmp/claude-desktop.deb
    state: present
  become: true
  when: force_install | default(false) | bool or claude_desktop_exists.rc != 0

- name: Clean up Claude Desktop deb package
  file:
    path: /tmp/claude-desktop.deb
    state: absent
  when: force_install | default(false) | bool or claude_desktop_exists.rc != 0
